name: Bug report
description: Report a problem with the DevSwap dApp or contracts
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "⚠️ For **security vulnerabilities**, do NOT use this form — see SECURITY.md (security@devswap.pro)."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug + what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [dApp / UI, Wallet / transactions, Smart contracts, i18n / RTL, Other]
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "browser + wallet + network (e.g. Chrome, MetaMask, BSC testnet)"
